<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1440" viewBox="0 0 1600 1440">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { fill: #111827; font: 700 30px "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .subtitle { fill: #4b5563; font: 500 15px "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 16; ry: 16; }
      .panel-soft { fill: #fcfcfd; stroke: #d4d4d8; stroke-width: 2; rx: 16; ry: 16; }
      .repeat { fill: none; stroke: #dc2626; stroke-width: 2.5; stroke-dasharray: 10 8; rx: 14; ry: 14; }
      .note { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 12; ry: 12; }
      .legend-box { fill: #f9fafb; stroke: #e5e7eb; stroke-width: 1.5; rx: 12; ry: 12; }
      .matrix-input { fill: #f7d7dc; stroke: #b98b92; stroke-width: 2; rx: 10; ry: 10; }
      .matrix-weight { fill: #ddead2; stroke: #8ea36c; stroke-width: 2; rx: 10; ry: 10; }
      .matrix-feature { fill: #f7eed1; stroke: #c2a85c; stroke-width: 2; rx: 10; ry: 10; }
      .matrix-activation { fill: #dce9f7; stroke: #6f92ba; stroke-width: 2; rx: 10; ry: 10; }
      .matrix-deriv { fill: #f8e2c5; stroke: #c58d46; stroke-width: 2; rx: 10; ry: 10; }
      .op { fill: #ead7aa; stroke: #9e8554; stroke-width: 2; rx: 8; ry: 8; }
      .loop-box { fill: #eef2ff; stroke: #94a3b8; stroke-width: 2; rx: 10; ry: 10; }
      .label { fill: #111827; font: 700 18px "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .small { fill: #374151; font: 500 14px "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .mini { fill: #4b5563; font: 500 12px "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .legend { fill: #111827; font: 600 14px "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .band { fill: #dbeafe; stroke: #bfdbfe; stroke-width: 1.5; rx: 12; ry: 12; }
      .band-text { fill: #1e3a8a; font: 700 22px "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .circle { fill: none; stroke: #1f2937; stroke-width: 2; }
      .flow { stroke: #6b7280; stroke-width: 2.5; fill: none; marker-end: url(#arrowGray); }
      .emph { stroke: #dc2626; stroke-width: 2.5; fill: none; marker-end: url(#arrowRed); }
    </style>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#6b7280"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1440"/>

  <text class="title" x="34" y="42">autodiff 矩阵原型：按真实代码修正后的数据流 图</text>
  <text class="subtitle" x="36" y="70">关键修正：一轮训练不是“只进 1 个点”， 而 是遍历 points 里的全部 samples 个点；<tspan x="36" dy="22">但每次前向建图仍然只 处理 1 个 (x, t)。</tspan></text>

  <rect class="legend-box" x="34" y="104" width="370" height="106"/>
  <rect class="matrix-input" x="50" y="120" width="22" height="22"/>
  <text class="legend" x="80" y="136">输入张量 / 叶子节点</text>
  <rect class="matrix-weight" x="50" y="154" width="22" height="22"/>
  <text class="legend" x="80" y="170">权重与偏置张量</text>
  <rect class="matrix-feature" x="230" y="120" width="22" height="22"/>
  <text class="legend" x="260" y="136">线性输出 / 残差</text>
  <rect class="matrix-activation" x="230" y="154" width="22" height="22"/>
  <text class="legend" x="260" y="170">激活张量 / 输出</text>
  <text class="small" x="50" y="196">块里小圆点 = 底层 Node; 大色块 = 宏观对象</text>

  <rect class="note" x="404" y="104" width="1160" height="84"/>
  <text class="label" x="434" y="139">真实训练语义</text>
  <text class="small" x="434" y="166">`loss_on_points(net, kind, points, create_graph)` 会 `for (const auto&amp; p : pts)` 逐点调用 `residual_at_point(...)` ，<tspan x="434" dy="20">把每个 `r_i^2` 累加后再除以 `pts.size()`。</tspan></text>

  <rect class="panel" x="34" y="216" width="1532" height="124"/>
  <text class="label" x="62" y="252">一轮 iter 的输入不是单点，而是固定点集 `points`</text>
  <rect class="matrix-input" x="62" y="268" width="150" height="46"/>
  <text class="small" x="78" y="296">p1 = (x1, t1)</text>
  <rect class="matrix-input" x="242" y="268" width="150" height="46"/>
  <text class="small" x="258" y="296">p2 = (x2, t2)</text>
  <rect class="matrix-input" x="422" y="268" width="150" height="46"/>
  <text class="small" x="438" y="296">p3 = (x3, t3)</text>
  <text class="label" x="610" y="298">...</text>
  <rect class="matrix-input" x="680" y="268" width="170" height="46"/>
  <text class="small" x="700" y="296">pN = (xN, tN)</text>
  <rect class="loop-box" x="930" y="250" width="270" height="64"/>
  <text class="label" x="964" y="278">for each point p_i in points</text>
  <text class="small" x="972" y="302">每次只建一个单点子图，重复 `samples` 次</text>
  <line class="flow" x1="850" y1="291" x2="930" y2="282"/>
  <line class="emph" x1="1200" y1="282" x2="1290" y2="282"/>
  <text class="small" x="1308" y="287">进入下面这张“单点子图”</text>

  <rect class="repeat" x="34" y="370" width="1532" height="470"/>
  <text class="label" x="56" y="398">单点子图：下面这一块只对应一个采样点 p_i = (x_i, t_i)</text>
  <text class="small" x="56" y="422">也就是说：当前实现没有把 `points` 组织成一 个 batch VarMatrix `[samples, 2]` 去一次性前向；<tspan x="56" dy="20">而是逐点调用 `forward_scalar(x, t)`。</tspan></text>

  <rect class="panel-soft" x="56" y="446" width="1488" height="246"/>
  <rect class="band" x="1468" y="446" width="56" height="246"/>
  <text class="band-text" x="1496" y="536" transform="rotate(90 1496 536)">Layer 1</text>

  <rect class="matrix-input" x="84" y="492" width="130" height="84"/>
  <circle class="circle" cx="126" cy="534" r="15"/>
  <circle class="circle" cx="170" cy="534" r="15"/>
  <text class="label" x="108" y="478">a_i</text>
  <text class="small" x="102" y="600">shape = [1, 2]</text>
  <text class="mini" x="121" y="539">x</text>
  <text class="mini" x="165" y="539">t</text>

  <rect class="matrix-weight" x="278" y="468" width="190" height="132"/>
  <circle class="circle" cx="316" cy="508" r="12"/>
  <circle class="circle" cx="356" cy="508" r="12"/>
  <circle class="circle" cx="396" cy="508" r="12"/>
  <circle class="circle" cx="436" cy="508" r="12"/>
  <circle class="circle" cx="316" cy="556" r="12"/>
  <circle class="circle" cx="356" cy="556" r="12"/>
  <circle class="circle" cx="396" cy="556" r="12"/>
  <circle class="circle" cx="436" cy="556" r="12"/>
  <text class="label" x="344" y="456">W1</text>
  <text class="small" x="332" y="622">shape = [2, 4]</text>

  <rect class="op" x="506" y="506" width="58" height="58"/>
  <text class="label" x="517" y="541">matmul</text>

  <rect class="matrix-feature" x="602" y="492" width="182" height="84"/>
  <circle class="circle" cx="636" cy="534" r="12"/>
  <circle class="circle" cx="676" cy="534" r="12"/>
  <circle class="circle" cx="716" cy="534" r="12"/>
  <circle class="circle" cx="756" cy="534" r="12"/>
  <text class="label" x="641" y="478">z1_pre</text>
  <text class="small" x="650" y="600">shape = [1, 4]</text>

  <rect class="matrix-weight" x="602" y="630" width="182" height="62"/>
  <circle class="circle" cx="636" cy="651" r="11"/>
  <circle class="circle" cx="676" cy="651" r="11"/>
  <circle class="circle" cx="716" cy="651" r="11"/>
  <circle class="circle" cx="756" cy="651" r="11"/>
  <text class="label" x="676" y="620">b1</text>
  <text class="small" x="650" y="762">shape = [1, 4]</text>

  <rect class="op" x="822" y="515" width="40" height="42"/>
  <text class="label" x="836" y="543">+</text>

  <rect class="matrix-feature" x="902" y="492" width="182" height="84"/>
  <circle class="circle" cx="936" cy="534" r="12"/>
  <circle class="circle" cx="976" cy="534" r="12"/>
  <circle class="circle" cx="1016" cy="534" r="12"/>
  <circle class="circle" cx="1056" cy="534" r="12"/>
  <text class="label" x="948" y="478">z1</text>
  <text class="small" x="950" y="600">shape = [1, 4]</text>

  <rect class="op" x="1120" y="515" width="48" height="42"/>
  <text class="label" x="1132" y="543">tanh</text>

  <rect class="matrix-activation" x="1206" y="492" width="182" height="84"/>
  <circle class="circle" cx="1240" cy="534" r="12"/>
  <circle class="circle" cx="1280" cy="534" r="12"/>
  <circle class="circle" cx="1320" cy="534" r="12"/>
  <circle class="circle" cx="1360" cy="534" r="12"/>
  <text class="label" x="1278" y="478">a1</text>
  <text class="small" x="1254" y="600">shape = [1, 4]</text>

  <line class="flow" x1="214" y1="534" x2="278" y2="534"/>
  <line class="flow" x1="468" y1="534" x2="506" y2="534"/>
  <line class="flow" x1="564" y1="534" x2="602" y2="534"/>
  <path class="flow" d="M 748 630 L 748 564 L 822 564"/>
  <line class="flow" x1="784" y1="534" x2="822" y2="534"/>
  <line class="flow" x1="862" y1="534" x2="902" y2="534"/>
  <line class="flow" x1="1084" y1="534" x2="1120" y2="534"/>
  <line class="flow" x1="1168" y1="534" x2="1206" y2="534"/>

  <rect class="panel-soft" x="56" y="736" width="1488" height="260"/>
  <rect class="band" x="1468" y="736" width="56" height="260"/>
  <text class="band-text" x="1496" y="816" transform="rotate(90 1496 726)">Layer 2</text>

  <rect class="matrix-activation" x="84" y="774" width="182" height="84"/>
  <circle class="circle" cx="118" cy="816" r="12"/>
  <circle class="circle" cx="158" cy="816" r="12"/>
  <circle class="circle" cx="198" cy="816" r="12"/>
  <circle class="circle" cx="238" cy="816" r="12"/>
  <text class="label" x="145" y="760">a1</text>
  <text class="small" x="132" y="882">shape = [1, 4]</text>

  <rect class="matrix-weight" x="338" y="750" width="96" height="132"/>
  <circle class="circle" cx="386" cy="778" r="12"/>
  <circle class="circle" cx="386" cy="810" r="12"/>
  <circle class="circle" cx="386" cy="842" r="12"/>
  <circle class="circle" cx="386" cy="874" r="12"/>
  <text class="label" x="370" y="738">W2</text>
  <text class="small" x="346" y="904">shape = [4, 1]</text>

  <rect class="op" x="470" y="792" width="58" height="48"/>
  <text class="label" x="481" y="822">matmul</text>

  <rect class="matrix-feature" x="566" y="776" width="100" height="80"/>
  <circle class="circle" cx="616" cy="816" r="13"/>
  <text class="label" x="583" y="762">z2_pre</text>
  <text class="small" x="560" y="880">shape = [1, 1]</text>

  <rect class="matrix-weight" x="566" y="908" width="100" height="54"/>
  <circle class="circle" cx="616" cy="935" r="11"/>
  <text class="label" x="596" y="900">b2</text>
  <text class="small" x="560" y="980">shape = [1, 1]</text>

  <rect class="op" x="706" y="796" width="40" height="40"/>
  <text class="label" x="720" y="823">+</text>

  <rect class="matrix-feature" x="784" y="776" width="100" height="80"/>
  <circle class="circle" cx="834" cy="816" r="13"/>
  <text class="label" x="820" y="762">z2</text>
  <text class="small" x="778" y="880">shape = [1, 1]</text>

  <rect class="op" x="926" y="796" width="54" height="40"/>
  <text class="label" x="940" y="823">read</text>

  <rect class="matrix-activation" x="1024" y="776" width="120" height="80"/>
  <circle class="circle" cx="1084" cy="816" r="13"/>
  <text class="label" x="1072" y="762">u_i</text>
  <text class="small" x="1030" y="880">shape = [1, 1]</text>

  <line class="flow" x1="266" y1="816" x2="338" y2="816"/>
  <line class="flow" x1="434" y1="816" x2="470" y2="816"/>
  <line class="flow" x1="528" y1="816" x2="566" y2="816"/>
  <path class="flow" d="M 650 908 L 650 842 L 706 842"/>
  <line class="flow" x1="666" y1="816" x2="706" y2="816"/>
  <line class="flow" x1="746" y1="816" x2="784" y2="816"/>
  <line class="flow" x1="884" y1="816" x2="926" y2="816"/>
  <line class="flow" x1="980" y1="816" x2="1024" y2="816"/>

  <rect class="panel-soft" x="34" y="1044" width="1532" height="190"/>
  <text class="label" x="60" y="1074">对单点 p_i 建导数图</text>
  <text class="label" x="60" y="1100">再得到单点 residual</text>
  <rect class="matrix-activation" x="74" y="1112" width="110" height="56"/>
  <circle class="circle" cx="129" cy="1140" r="13"/>
  <text class="small" x="108" y="1186">u_i [1,1]</text>
  <rect class="matrix-deriv" x="252" y="1086" width="92" height="56"/>
  <circle class="circle" cx="298" cy="1114" r="12"/>
  <text class="small" x="272" y="1080">u_t [1,1]</text>
  <rect class="matrix-deriv" x="252" y="1156" width="92" height="56"/>
  <circle class="circle" cx="298" cy="1184" r="12"/>
  <text class="small" x="272" y="1216">u_x [1,1]</text>
  <rect class="matrix-deriv" x="412" y="1086" width="92" height="56"/>
  <circle class="circle" cx="458" cy="1114" r="12"/>
  <text class="small" x="430" y="1080">u_tt [1,1]</text>
  <rect class="matrix-deriv" x="412" y="1156" width="92" height="56"/>
  <circle class="circle" cx="458" cy="1184" r="12"/>
  <text class="small" x="424" y="1216">u_xx [1,1]</text>
  <rect class="matrix-deriv" x="572" y="1156" width="92" height="56"/>
  <circle class="circle" cx="618" cy="1184" r="12"/>
  <text class="small" x="580" y="1216">u_xxx [1,1]</text>
  <rect class="matrix-feature" x="760" y="1100" width="320" height="96"/>
  <text class="label" x="846" y="1128">单点 residual r_i</text>
  <text class="small" x="800" y="1152">按 PDE 选择依赖项：</text>
  <text class="small" x="790" y="1174">u_i / u_t / u_x / u_xx / u_xxx / u_tt</text>
  <text class="small" x="848" y="1194">shape = [1,1] 标量 Node</text>
  <rect class="matrix-feature" x="1120" y="1100" width="356" height="96"/>
  <text class="label" x="1174" y="1132">跨全部 samples 聚合</text>
  <text class="small" x="1150" y="1158">loss = (r1^2 + r2^2 + ... + rN^2) / N</text>
  <text class="small" x="1200" y="1182">这里才对应一轮训练真正使用的全部点</text>

  <line class="flow" x1="184" y1="1140" x2="252" y2="1114"/>
  <line class="flow" x1="184" y1="1140" x2="252" y2="1184"/>
  <line class="flow" x1="344" y1="1114" x2="412" y2="1114"/>
  <line class="flow" x1="344" y1="1184" x2="412" y2="1184"/>
  <line class="flow" x1="504" y1="1184" x2="572" y2="1184"/>
  <line class="emph" x1="184" y1="1140" x2="760" y2="1132"/>
  <path class="emph" d="M 664 1184 L 716 1184 L 716 1164 L 760 1164"/>
  <line class="emph" x1="1080" y1="1148" x2="1120" y2="1148"/>

  <rect class="panel" x="34" y="1272" width="1532" height="128"/>
  <text class="label" x="60" y="1306">训练闭环</text>
  <rect class="matrix-feature" x="70" y="1330" width="116" height="50"/>
  <circle class="circle" cx="128" cy="1355" r="12"/>
  <text class="small" x="113" y="1322">loss</text>
  <rect class="loop-box" x="262" y="1324" width="222" height="60"/>
  <text class="label" x="284" y="1352">zero_grad + backward</text>
  <text class="small" x="300" y="1374">写回 17 个参数 grad</text>
  <rect class="loop-box" x="566" y="1324" width="160" height="60"/>
  <text class="label" x="602" y="1352">sgd_step</text>
  <text class="small" x="600" y="1374">lr + grad_clip</text>
  <rect class="loop-box" x="812" y="1318" width="320" height="72"/>
  <text class="label" x="866" y="1346">更新后的参数池</text>
  <text class="small" x="844" y="1370">W1 / b1 / W2 / b2，共 17 个叶子 Node</text>
  <rect class="loop-box" x="1210" y="1324" width="286" height="60"/>
  <text class="label" x="1258" y="1352">进入下一轮 iter</text>
  <text class="small" x="1236" y="1374">继续遍历同一组或新采样的 points</text>

  <line class="flow" x1="186" y1="1355" x2="262" y2="1354"/>
  <line class="flow" x1="484" y1="1354" x2="566" y2="1354"/>
  <line class="flow" x1="726" y1="1354" x2="812" y2="1354"/>
  <line class="flow" x1="1132" y1="1354" x2="1210" y2="1354"/>
</svg>