<rect width="100%" height="100%" class="bg" />
<text x="40" y="50" class="title">PINN: 典型两层感知机 (MLP) 的矩阵维度与梯度回传数据流</text>
<text x="42" y="80" class="subtitle">全面呈现纯 C++ 前向矩阵计算流，以及基于反向传播(Chain Rule)的特征维度对照与梯度偏导更新路径。</text>
<rect x="980" y="15" width="400" height="85" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="8" />
